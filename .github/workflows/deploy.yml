name: Deploy Vite app to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_GROQ_MODEL: ${{ secrets.VITE_GROQ_MODEL }}
          VITE_CLOUD_SYNC_MODE: ${{ secrets.VITE_CLOUD_SYNC_MODE }}
          VITE_CLOUD_SYNC_ENDPOINT: ${{ secrets.VITE_CLOUD_SYNC_ENDPOINT }}
          VITE_CLOUD_SYNC_API_KEY: ${{ secrets.VITE_CLOUD_SYNC_API_KEY }}
          VITE_CLOUD_PROJECT: ${{ secrets.VITE_CLOUD_PROJECT }}
        run: npm run build

      - name: Prepare SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
