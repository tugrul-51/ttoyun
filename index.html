<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#12162a" />
    <meta
      name="description"
      content="TT Eğitsel Oyun Platformu - web ve SCORM uyumlu, öğretmen ve öğrenci dostu çok oyunlu eğitim platformu."
    />
    <meta name="application-name" content="TT Eğitsel Oyun Platformu" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preload" as="image" href="./tt-logo.png" />
    <title>T-T Eğitsel Oyunlar</title>
    <style>html,body,#root{height:100%}body{margin:0;background:#081120;color:#fff;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}#boot-splash{display:grid;place-items:center;min-height:100dvh;min-height:100svh;padding:24px;background:radial-gradient(circle at top, rgba(108,92,231,.22), transparent 32%),radial-gradient(circle at bottom right, rgba(78,205,196,.18), transparent 28%), #081120}#boot-card{width:min(560px,100%);padding:28px;border-radius:28px;background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 44px rgba(0,0,0,.28);text-align:center}.boot-bar{height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:16px}.boot-bar>span{display:block;height:100%;width:42%;border-radius:999px;background:linear-gradient(90deg,#6C5CE7,#4ECDC4,#FFE66D);animation:bootPulse 1.2s ease-in-out infinite alternate}@keyframes bootPulse{from{transform:translateX(0)}to{transform:translateX(115%)}}</style>
  </head>
  <body>
    <noscript>Bu uygulamayı kullanmak için tarayıcınızda JavaScript etkin olmalıdır.</noscript>
    <div id="root"><div id="boot-splash"><div id="boot-card"><div style="display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-weight:900">✨ T-T Eğitsel Oyunlar hazırlanıyor</div><h1 style="margin:18px 0 8px;font-size:clamp(26px,4vw,36px)">Premium ders sahnesi yükleniyor</h1><p style="margin:0;color:#AFC2DF;line-height:1.6">Hızlı kullanım, sınıf merkezi ve SCORM araçları hazırlanıyor.</p><div class="boot-bar"><span></span></div></div></div></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
